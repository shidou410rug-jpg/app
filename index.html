<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テレアポ同期マトリックス</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-900 p-2 md:p-6 text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const TERMS = ["11:00-13:00", "13:00-15:00", "15:00-17:00", "17:00-19:00"];
        
        const APP_KEYS = [
            "app_28_connect", "app_28_connect_3day", 
            "app_28_callback", "app_28_callback_3day",
            "app_27_connect", "app_27_connect_3day", 
            "app_27_callback", "app_27_callback_3day", 
            "app_27_sms"
        ];

        const SYNC_URL = "https://kvdb.io/MN86yvU67wUshH9pZpLgS6/";

        const createInitialMember = (id, name, buddy) => ({
            id, name, buddyGroup: buddy,
            calls_28: 0, calls_27: 0,
            connects_28: 0, connects_27: 0,
            callbacks_28: 0, callbacks_27: 0,
            goalCalls: 0, 
            initialTermGoals: TERMS.reduce((acc, t) => { acc[t] = 0; return acc; }, {}), 
            termGoals: TERMS.reduce((acc, t) => { acc[t] = 0; return acc; }, {}), 
            hourly: TERMS.reduce((acc, term) => {
                acc[term] = APP_KEYS.reduce((a, k) => { a[k] = 0; return a; }, {});
                return acc;
            }, {})
        });

        const defaultMembers = [
            createInitialMember("user-1", "オープン太郎", "バディ1"),
            createInitialMember("user-2", "オープン花子", "バディ1")
        ];

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false); // 🔑 ログイン管理
            const [roomName, setRoomName] = useState("");        // 🔑 パスキー（部屋名）
            const [activeTab, setActiveTab] = useState("matrix");
            const [members, setMembers] = useState(defaultMembers);
            const [selectedMemberId, setSelectedMemberId] = useState("user-1");
            const [selectedTerm, setSelectedTerm] = useState("11:00-13:00");
            const [selectedAppType, setSelectedAppType] = useState("app_28_connect");
            const [isSyncing, setIsSyncing] = useState(false);
            
            // クラウドからデータ取得が完了したかを管理する超重要フラグ（データ消滅を防ぐ防壁）
            const [hasLoaded, setHasLoaded] = useState(false); 

            // --- 🔄 クラウド保存（PUT） ---
            const saveToCloud = async (currentMembers, currentRoom) => {
                if (!hasLoaded || !currentRoom) return; // 🛡️ ロード完了前は絶対に上書きセーブさせない
                try {
                    setIsSyncing(true);
                    await fetch(`${SYNC_URL}${currentRoom}`, {
                        method: "PUT",
                        body: JSON.stringify(currentMembers),
                        headers: { "Content-Type": "application/json" }
                    });
                } catch (e) {
                    console.error("保存失敗:", e);
                } finally {
                    setIsSyncing(false);
                }
            };

            // --- 🔄 クラウド読み込み（GET） ---
            const loadFromCloud = async (currentRoom) => {
                if (!currentRoom) return;
                try {
                    const res = await fetch(`${SYNC_URL}${currentRoom}`);
                    if (res.ok) {
                        const text = await res.text();
                        if (text && text.trim().length > 0) {
                            const data = JSON.parse(text);
                            if (data && Array.isArray(data) && data.length > 0) {
                                setMembers(data);
                            }
                        }
                    }
                    setHasLoaded(true); // 🛡️ データが空であれ存在してあれ、初回の確認が終わったらフラグを立てる
                } catch (e) {
                    console.error("読み込み失敗:", e);
                    setHasLoaded(true);
                }
            };

            // 🔑 ログイン処理
            const handleLogin = (e) => {
                e.preventDefault();
                if (!roomName.trim()) {
                    alert("パスキーを入力してください（例: 0123）");
                    return;
                }
                setIsLoggedIn(true);
            };

            // ログイン成功後、3秒おきの自動同期ループを開始
            useEffect(() => {
                if (!isLoggedIn || !roomName) return;
                loadFromCloud(roomName);
                const timer = setInterval(() => { loadFromCloud(roomName); }, 3000);
                return () => clearInterval(timer);
            }, [isLoggedIn, roomName]);

            // --- ⚙️ データ書き換えトリガー ---
            const changeAndSync = (newMembers) => {
                setMembers(newMembers);
                if (hasLoaded) {
                    saveToCloud(newMembers, roomName);
                }
            };

            const addMember = () => {
                const newId = `user-${Date.now()}`;
                changeAndSync([...members, createInitialMember(newId, `インターン生${members.length + 1}`, "なし")]);
            };

            const removeMember = (id) => {
                if (members.length <= 1) return;
                const filtered = members.filter(m => m.id !== id);
                if (selectedMemberId === id) setSelectedMemberId(filtered[0].id);
                changeAndSync(filtered);
            };

            const updateMemberField = (id, field, value) => {
                changeAndSync(members.map(m => m.id === id ? { ...m, [field]: value } : m));
            };

            const updateInitialTermGoal = (id, term, value) => {
                changeAndSync(members.map(m => {
                    if (m.id !== id) return m;
                    const nextInit = { ...m.initialTermGoals, [term]: value };
                    const nextCurrent = { ...m.termGoals, [term]: value }; 
                    return { ...m, initialTermGoals: nextInit, termGoals: nextCurrent };
                }));
            };

            const adjustTermGoal = (id, term, amount) => {
                changeAndSync(members.map(m => {
                    if (m.id !== id) return m;
                    const nextVal = Math.max(0, (m.termGoals[term] || 0) + amount);
                    return { ...m, termGoals: { ...m.termGoals, [term]: nextVal } };
                }));
            };

            const handleAppChange = (memberId, term, type, amount) => {
                changeAndSync(members.map(m => {
                    if (m.id !== memberId) return m;
                    return {
                        ...m,
                        hourly: {
                            ...m.hourly,
                            [term]: { ...m.hourly[term], [type]: Math.max(0, m.hourly[term][type] + amount) }
                        }
                    };
                }));
            };

            const handleActivityChange = (memberId, type, amount) => {
                changeAndSync(members.map(m => m.id === memberId ? { ...m, [type]: Math.max(0, m[type] + amount) } : m));
            };

            const handleResetAll = () => {
                if(!confirm("本日の予約数・行動量の進捗を完全に0にリセットしますか？（※設定した目標は残ります）")) return;
                changeAndSync(members.map(m => ({
                    ...m,
                    calls_28: 0, calls_27: 0, connects_28: 0, connects_27: 0, callbacks_28: 0, callbacks_27: 0,
                    hourly: TERMS.reduce((acc, term) => {
                        acc[term] = APP_KEYS.reduce((a, k) => { a[k] = 0; return a; }, {});
                        return acc;
                    }, {})
                })));
            };

            // --- 📊 計算集計 ---
            const stats = useMemo(() => {
                let totalInitialGoalApps = 0; let totalAdjustedGoalApps = 0;
                let totalGoalCalls = 0; let totalCalls = 0; let totalApps = 0; let totalConnects = 0; let totalCallbacks = 0;

                const termTotals = TERMS.reduce((acc, term) => {
                    acc[term] = { apps: 0, initialGoalApps: 0, adjustedGoalApps: 0 };
                    return acc;
                }, {});

                members.forEach(m => {
                    totalGoalCalls += (m.goalCalls || 0);
                    totalCalls += (m.calls_28 + m.calls_27);
                    totalConnects += (m.connects_28 + m.connects_27);
                    totalCallbacks += (m.callbacks_28 + m.callbacks_27);

                    TERMS.forEach(term => {
                        const h = m.hourly[term];
                        const termApps = APP_KEYS.reduce((sum, k) => sum + h[k], 0);
                        const initG = m.initialTermGoals ? (m.initialTermGoals[term] || 0) : 0;
                        const adjG = m.termGoals ? (m.termGoals[term] || 0) : 0;
                        
                        totalApps += termApps;
                        totalInitialGoalApps += initG;
                        totalAdjustedGoalApps += adjG;

                        termTotals[term].apps += termApps;
                        termTotals[term].initialGoalApps += initG;
                        termTotals[term].adjustedGoalApps += adjG;
                    });
                });

                const buddyStats = {};
                members.forEach(m => {
                    if (!m.buddyGroup || m.buddyGroup === "なし" || m.buddyGroup === "none") return;
                    if (!buddyStats[m.buddyGroup]) buddyStats[m.buddyGroup] = { initialGoalApps: 0, adjustedGoalApps: 0, apps: 0 };
                    TERMS.forEach(term => {
                        buddyStats[m.buddyGroup].initialGoalApps += (m.initialTermGoals ? (m.initialTermGoals[term] || 0) : 0);
                        buddyStats[m.buddyGroup].adjustedGoalApps += (m.termGoals ? (m.termGoals[term] || 0) : 0);
                        buddyStats[m.buddyGroup].apps += APP_KEYS.reduce((sum, k) => sum + m.hourly[term][k], 0);
                    });
                });

                return {
                    total: { goalCalls: totalGoalCalls, initialGoalApps: totalInitialGoalApps, adjustedGoalApps: totalAdjustedGoalApps, calls: totalCalls, apps: totalApps, connects: totalConnects, callbacks: totalCallbacks },
                    terms: termTotals,
                    buddies: buddyStats
                };
            }, [members]);

            // 🛡️ まだログインしていない場合は「パスキー入力用ログイン画面」を強制表示
            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-950 px-4 select-none">
                        <form onSubmit={handleLogin} className="w-full max-w-sm bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl space-y-4">
                            <div className="text-center">
                                <h1 className="text-xl font-black text-indigo-400">🔑 テレアポ進捗システム</h1>
                                <p className="text-xs text-gray-400 mt-1">共通のパスキーを入力してログインしてください</p>
                            </div>
                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-gray-300">パスキー (数字や文字)</label>
                                <input 
                                    type="text" 
                                    value={roomName}
                                    onChange={(e) => setRoomName(e.target.value.replace(/[^a-zA-Z0-9_]/g, ""))}
                                    placeholder="例: 0123"
                                    className="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-center text-xl font-black tracking-widest text-amber-400 outline-none focus:ring-2 focus:ring-indigo-500"
                                />
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-55 text-white font-black py-3 rounded-xl shadow-lg transition tracking-wider text-sm">
                                同期ルームに入る
                            </button>
                        </form>
                    </div>
                );
            }

            const currentSelectedMember = members.find(m => m.id === selectedMemberId) || members[0];

            return (
                <div className="max-w-7xl mx-auto space-y-4 pb-12 select-none">
                    
                    {/* 全体総進捗ダッシュボード */}
                    <div className="bg-gradient-to-r from-slate-800 via-indigo-950 to-slate-800 p-4 rounded-2xl border border-indigo-500/40 shadow-xl relative">
                        <div className="absolute top-2 right-3 flex items-center gap-1.5 text-[10px] text-gray-400">
                            <span className={`w-2 h-2 rounded-full ${isSyncing ? "bg-amber-400 animate-ping" : "bg-emerald-400"}`}></span>
                            <span>ルームキー: {roomName}</span>
                        </div>
                        <h2 className="text-center text-xs font-bold text-indigo-400 tracking-widest mb-1.5">📱 本日の全体総進捗 (全員の合計)</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-5 gap-2">
                            <div className="bg-slate-900 p-2 rounded-xl text-center border-2 border-emerald-500/60 col-span-1 md:col-span-2">
                                <p className="text-[10px] text-emerald-400 font-black">🔥 修正後 総予約数</p>
                                <p className="text-2xl font-black text-emerald-400">{stats.total.apps} <span className="text-xs font-normal text-gray-500">/ {stats.total.adjustedGoalApps} A</span></p>
                                <div className="text-[10px] text-gray-400 mt-1 flex justify-center gap-3">
                                    <span>修正後達成率: <b className="text-amber-400 text-xs">{stats.total.adjustedGoalApps > 0 ? Math.round((stats.total.apps / stats.total.adjustedGoalApps) * 100) : 0}%</b></span>
                                    <span>(朝一目標: {stats.total.initialGoalApps}A / <b className="text-gray-300">{stats.total.initialGoalApps > 0 ? Math.round((stats.total.apps / stats.total.initialGoalApps) * 100) : 0}%</b>)</span>
                                </div>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center flex flex-col justify-center">
                                <p className="text-[10px] text-indigo-300">総架電数累積</p>
                                <p className="text-xl font-black text-indigo-300">{stats.total.calls} <span className="text-[10px] font-normal text-gray-500">/ {stats.total.goalCalls}</span></p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center flex flex-col justify-center">
                                <p className="text-[10px] text-amber-400">総着電数累積</p>
                                <p className="text-xl font-black text-amber-400">{stats.total.connects}</p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center flex flex-col justify-center">
                                <p className="text-[10px] text-purple-400">総折り返し数累積</p>
                                <p className="text-xl font-black text-purple-400">{stats.total.callbacks}</p>
                            </div>
                        </div>
                    </div>

                    {/* タブナビゲーション */}
                    <div className="flex bg-slate-800 p-1 rounded-xl w-full max-w-lg mx-auto border border-slate-700 text-xs">
                        <button onClick={() => setActiveTab("matrix")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "matrix" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>📊 進捗表</button>
                        <button onClick={() => setActiveTab("activity")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "activity" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>📞 行動量入力</button>
                        <button onClick={() => setActiveTab("adjust")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "adjust" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>📈 目標修正</button>
                        <button onClick={() => setActiveTab("settings")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "settings" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>⚙️ 朝一設定</button>
                    </div>

                    {/* ---------------- 📊 タブ1: 進捗表 ---------------- */}
                    {activeTab === "matrix" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-2 overflow-hidden shadow-inner">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[780px]">
                                    <thead>
                                        <tr className="border-b border-slate-700 text-[11px] text-gray-400">
                                            <th className="p-2 sticky left-0 bg-slate-800 z-10 w-28">メンバー</th>
                                            <th className="p-2 text-center w-52">個人累積・分析レート</th>
                                            {TERMS.map(t => <th key={t} className="p-2 text-center text-gray-300 font-medium">{t}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50 text-xs">
                                        {members.map(m => {
                                            const myTotalApps = TERMS.reduce((sum, t) => sum + APP_KEYS.reduce((s, k) => s + m.hourly[t][k], 0), 0);
                                            const myAdjustedGoal = TERMS.reduce((sum, t) => sum + (m.termGoals[t] || 0), 0);
                                            const myInitialGoal = TERMS.reduce((sum, t) => sum + (m.initialTermGoals[t] || 0), 0);
                                            
                                            const myConnectApps = TERMS.reduce((sum, t) => sum + m.hourly[t].app_28_connect + m.hourly[t].app_28_connect_3day + m.hourly[t].app_27_connect + m.hourly[t].app_27_connect_3day, 0);
                                            const myCallbackApps = TERMS.reduce((sum, t) => sum + m.hourly[t].app_28_callback + m.hourly[t].app_28_callback_3day + m.hourly[t].app_27_callback + m.hourly[t].app_27_callback_3day, 0);
                                            const mySmsApps = TERMS.reduce((sum, t) => sum + m.hourly[t].app_27_sms, 0);
                                            const my3DayApps = TERMS.reduce((sum, t) => {
                                                const h = m.hourly[t];
                                                return sum + h.app_28_connect_3day + h.app_28_callback_3day + h.app_27_connect_3day + h.app_27_callback_3day;
                                            }, 0);

                                            const myTotalConnects = m.connects_28 + m.connects_27;
                                            const myTotalCallbacks = m.callbacks_28 + m.callbacks_27;

                                            const connectRateStr = myConnectApps > myTotalConnects ? "⚠️エラー" : (myTotalConnects > 0 ? Math.round((myConnectApps / myTotalConnects) * 100) + "%" : "0%");
                                            const callbackRateStr = myCallbackApps > myTotalCallbacks ? "⚠️エラー" : (myTotalCallbacks > 0 ? Math.round((myCallbackApps / myTotalCallbacks) * 100) + "%" : "0%");
                                            const rate3Day = myTotalApps > 0 ? Math.round((my3DayApps / myTotalApps) * 100) : 0;

                                            const bStat = stats.buddies[m.buddyGroup] || { apps:0, adjustedGoalApps:0 };

                                            return (
                                                <tr key={m.id} className="hover:bg-slate-750">
                                                    <td className="p-2 font-bold sticky left-0 bg-slate-800 shadow-md z-10">
                                                        <div className="text-white text-sm">{m.name}</div>
                                                        {m.buddyGroup !== "none" && m.buddyGroup !== "なし" && <div className="text-[10px] text-purple-400">👥 {bStat.apps}/{bStat.adjustedGoalApps}A</div>}
                                                    </td>
                                                    <td className="p-2 bg-slate-900/20 text-left text-[11px] font-medium space-y-0.5 whitespace-nowrap border-r border-slate-700/30">
                                                        <div className="flex justify-between text-gray-300"><span>総予約:</span><span className="font-bold text-emerald-400">{myTotalApps} / {myAdjustedGoal} <span className="text-[9px] text-gray-500">({myInitialGoal})</span></span></div>
                                                        <div className="text-[10px] text-cyan-400 flex justify-between bg-cyan-950/30 px-1 rounded"><span>💎 3日以内比率:</span><span className="font-bold">{rate3Day}% <span>({my3DayApps}A)</span></span></div>
                                                        <div className={`text-[10px] flex justify-between px-1 rounded ${connectRateStr.includes("⚠️") ? "bg-red-950/50 text-red-400 font-bold" : "text-amber-400/90"}`}><span>📞 着電→予約率:</span><span>{connectRateStr} <span className="text-[9px] opacity-60">({myConnectApps}/{myTotalConnects})</span></span></div>
                                                        <div className={`text-[10px] flex justify-between px-1 rounded ${callbackRateStr.includes("⚠️") ? "bg-red-950/50 text-red-400 font-bold" : "text-purple-400/90"}`}><span>🔄 折返→予約率:</span><span>{callbackRateStr} <span className="text-[9px] opacity-60">({myCallbackApps}/{myTotalCallbacks})</span></span></div>
                                                    </td>
                                                    {TERMS.map(term => {
                                                        const h = m.hourly[term];
                                                        const termApps = APP_KEYS.reduce((sum, k) => sum + h[k], 0);
                                                        const tGoal = m.termGoals[term] || 0;
                                                        return termApps === 0 ? (
                                                            <td key={term} className="p-2 text-center text-gray-600 font-medium">-</td>
                                                        ) : (
                                                            <td key={term} className="p-2 text-center min-w-[110px] bg-emerald-950/20">
                                                                <div className="text-base font-black text-emerald-400">{termApps} <span className="text-[10px] font-normal text-gray-500">/ {tGoal}A</span></div>
                                                                <div className="text-[9px] text-gray-400 leading-tight mt-0.5 max-w-[110px] mx-auto text-left pl-2">
                                                                    {h.app_28_connect > 0 && <div>28着:{h.app_28_connect}</div>}
                                                                    {h.app_28_connect_3day > 0 && <div className="text-cyan-400 font-bold">28着(3日):{h.app_28_connect_3day}</div>}
                                                                    {h.app_28_callback > 0 && <div>28折:{h.app_28_callback}</div>}
                                                                    {h.app_28_callback_3day > 0 && <div className="text-cyan-400 font-bold">28折(3日):{h.app_28_callback_3day}</div>}
                                                                    {h.app_27_connect > 0 && <div>27着:{h.app_27_connect}</div>}
                                                                    {h.app_27_connect_3day > 0 && <div className="text-cyan-400 font-bold">27着(3日):{h.app_27_connect_3day}</div>}
                                                                    {h.app_27_callback > 0 && <div>27折:{h.app_27_callback}</div>}
                                                                    {h.app_27_callback_3day > 0 && <div className="text-cyan-400 font-bold">27折(3日):{h.app_27_callback_3day}</div>}
                                                                    {h.app_27_sms > 0 && <div>27SMS:{h.app_27_sms}</div>}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                    <tfoot>
                                        <tr className="bg-slate-950 font-bold border-t-2 border-slate-600 text-xs">
                                            <td className="p-3 sticky left-0 bg-slate-950 z-10 text-indigo-400">⏰ 全員合計</td>
                                            <td className="p-3 text-center text-emerald-400 text-sm">{stats.total.apps} / {stats.total.adjustedGoalApps} A</td>
                                            {TERMS.map(term => {
                                                const tData = stats.terms[term];
                                                const rate = tData.adjustedGoalApps > 0 ? Math.round((tData.apps / tData.adjustedGoalApps) * 100) : 0;
                                                return (
                                                    <td key={term} className="p-3 text-center">
                                                        <div className="text-emerald-400 text-sm font-black">{tData.apps} / {tData.adjustedGoalApps} A</div>
                                                        <div className="text-[10px] bg-slate-800 text-amber-400 rounded px-1 py-0.5 mt-1 inline-block">修正後達成率:{rate}%</div>
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* ---------------- 📞 タブ2: 行動量・アポ入力（完全平等フラット設計） ---------------- */}
                    {activeTab === "activity" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-4 space-y-4 shadow-xl">
                            <div className="flex items-center gap-2 bg-slate-900 p-2 rounded-xl border border-slate-700">
                                <label className="text-xs font-bold text-gray-400 whitespace-nowrap">インターン生:</label>
                                <select value={selectedMemberId} onChange={(e) => setSelectedMemberId(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-xs font-bold text-white outline-none">
                                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                            </div>

                            {/* アポ予約入力エリア */}
                            <div className="p-3 rounded-xl bg-emerald-950/20 border border-emerald-900/40 space-y-3">
                                <div className="text-xs font-black text-emerald-400 border-b border-emerald-900/30 pb-1">🎯 アポ（予約）の記録（プルダウン必須）</div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[10px] text-gray-400 font-bold mb-1">① 時間帯（ターム）</label>
                                        <select value={selectedTerm} onChange={(e) => setSelectedTerm(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded p-1 text-xs text-white outline-none">
                                            {TERMS.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 font-bold mb-1">② アポ経路</label>
                                        <select value={selectedAppType} onChange={(e) => setSelectedAppType(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded p-1 text-xs text-emerald-300 font-bold outline-none">
                                            <option value="app_28_connect">28卒(着電・通常)</option>
                                            <option value="app_28_connect_3day">💎 28卒(着電・3日以内)</option>
                                            <option value="app_28_callback">28卒(折り返し・通常)</option>
                                            <option value="app_28_callback_3day">💎 28卒(折り返し・3日以内)</option>
                                            <option value="app_27_connect">27卒(着電・通常)</option>
                                            <option value="app_27_connect_3day">💎 27卒(着電・3日以内)</option>
                                            <option value="app_27_callback">27卒(折り返し・通常)</option>
                                            <option value="app_27_callback_3day">💎 27卒(折り返し・3日以内)</option>
                                            <option value="app_27_sms">27卒(SMS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="flex items-center justify-between bg-slate-950 px-3 py-1.5 rounded border border-slate-800">
                                    <span className="text-[11px] text-gray-400">現在の獲得件数:</span>
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => handleAppChange(selectedMemberId, selectedTerm, selectedAppType, -1)} className="w-7 h-7 bg-slate-800 rounded text-gray-400 font-black text-sm">-1</button>
                                        <span className="font-black text-emerald-400 text-lg w-6 text-center">{currentSelectedMember.hourly[selectedTerm][selectedAppType]}</span>
                                        <button onClick={() => handleAppChange(selectedMemberId, selectedTerm, selectedAppType, 1)} className="w-7 h-7 bg-emerald-600 rounded text-white font-black text-sm">+1</button>
                                    </div>
                                </div>
                            </div>

                            {/* 行動量累積マトリックス（左右50%ずつの完全同一サイズ仕様） */}
                            <div className="p-3 rounded-xl bg-slate-900/60 border border-slate-700 space-y-3">
                                <div className="text-xs font-black text-indigo-400 border-b border-slate-800 pb-1">📊 1日の行動量（完全累積ポチポチ表）</div>
                                <div className="overflow-hidden rounded-lg border border-slate-800 bg-slate-950/40">
                                    <table className="w-full text-center border-collapse text-xs table-fixed">
                                        <thead>
                                            <tr className="bg-slate-950 text-[10px] text-gray-400 border-b border-slate-800">
                                                <th className="p-2 text-left w-16">項目</th>
                                                <th className="p-2 text-gray-200 font-bold border-r border-slate-800 w-1/2">28卒</th>
                                                <th className="p-2 text-gray-200 font-bold w-1/2">27卒</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/60">
                                            {[
                                                { label: "架電数", k28: "calls_28", k27: "calls_27", color: "text-indigo-300" },
                                                { label: "着電数", k28: "connects_28", k27: "connects_27", color: "text-amber-400" },
                                                { label: "折り返し", k28: "callbacks_28", k27: "callbacks_27", color: "text-purple-400" }
                                            ].map(row => (
                                                <tr key={row.label}>
                                                    <td className={`p-2 text-left font-black border-r border-slate-800 ${row.color}`}>{row.label}</td>
                                                    
                                                    {/* 28卒コントローラー */}
                                                    <td className="p-2 space-y-1.5 border-r border-slate-800">
                                                        <div className="text-lg font-black text-white">{currentSelectedMember[row.k28]} <span className="text-[10px] text-gray-500 font-normal">件</span></div>
                                                        <div className="flex gap-1 justify-center flex-wrap">
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, -50)} className="px-1 py-0.5 text-[9px] text-red-400 font-bold">-50</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, -10)} className="px-1 py-0.5 text-[9px] text-red-400 font-bold">-10</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, -5)} className="px-1 py-0.5 text-[9px] text-red-400 font-bold">-5</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, -1)} className="px-1.5 py-0.5 text-xs text-gray-400 bg-slate-900 border border-slate-800 rounded">-1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, 1)} className="px-2 py-0.5 bg-slate-700 text-white rounded font-bold text-xs">+1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, 5)} className="px-2 py-0.5 bg-blue-600 text-white rounded font-bold text-xs">+5</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, 10)} className="px-2 py-0.5 bg-indigo-600 text-white rounded font-bold text-xs">+10</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k28, 50)} className="px-2 py-0.5 bg-purple-600 text-white rounded font-bold text-xs">+50</button>
                                                        </div>
                                                    </td>

                                                    {/* 27卒コントローラー（28卒と完全に均等） */}
                                                    <td className="p-2 space-y-1.5">
                                                        <div className="text-lg font-black text-white">{currentSelectedMember[row.k27]} <span className="text-[10px] text-gray-500 font-normal">件</span></div>
                                                        <div className="flex gap-1 justify-center flex-wrap">
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, -50)} className="px-1 py-0.5 text-[9px] text-red-400 font-bold">-50</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, -10)} className="px-1 py-0.5 text-[9px] text-red-400 font-bold">-10</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, -5)} className="px-1 py-0.5 text-[9px] text-red-400 font-bold">-5</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, -1)} className="px-1.5 py-0.5 text-xs text-gray-400 bg-slate-900 border border-slate-800 rounded">-1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, 1)} className="px-2 py-0.5 bg-slate-700 text-white rounded font-bold text-xs">+1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, 5)} className="px-2 py-0.5 bg-blue-600 text-white rounded font-bold text-xs">+5</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, 10)} className="px-2 py-0.5 bg-indigo-600 text-white rounded font-bold text-xs">+10</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.k27, 50)} className="px-2 py-0.5 bg-purple-600 text-white rounded font-bold text-xs">+50</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ---------------- 📈 タブ3: 目標修正ページ ---------------- */}
                    {activeTab === "adjust" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-4 space-y-4 shadow-xl">
                            <div>
                                <h2 className="text-sm font-black text-white">📈 予約目標数の調整（上方修正・下方修正）</h2>
                                <p className="text-[10px] text-gray-400 mt-0.5">数値を増減させると、全体の達成率が即座に再計算されます。</p>
                            </div>

                            <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-1">
                                {members.map(m => (
                                    <div key={m.id} className="bg-slate-900/70 p-3 rounded-xl border border-slate-700 space-y-2">
                                        <div className="flex justify-between items-center border-b border-slate-800 pb-1">
                                            <span className="text-sm font-black text-white">{m.name}</span>
                                            <span className="text-[10px] text-purple-300 bg-purple-950/50 px-2 py-0.5 rounded border border-purple-900/30">👥 {m.buddyGroup}</span>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 pt-1">
                                            {TERMS.map(term => {
                                                const currentG = m.termGoals[term] || 0;
                                                const initialG = m.initialTermGoals[term] || 0;
                                                const diffColor = currentG > initialG ? "text-cyan-400" : currentG < initialG ? "text-red-400" : "text-gray-400";

                                                return (
                                                    <div key={term} className="bg-slate-950/60 px-3 py-1.5 rounded-lg border border-slate-850 flex items-center justify-between text-xs">
                                                        <div>
                                                            <div className="text-gray-400 font-bold">{term}</div>
                                                            <div className="text-[10px] text-gray-500">朝一の初期: {initialG}A</div>
                                                        </div>
                                                        <div className="flex items-center gap-2">
                                                            <button onClick={() => adjustTermGoal(m.id, term, -1)} className="w-6 h-6 bg-red-950/80 text-red-400 hover:bg-red-900 rounded font-black border border-red-900/50 flex items-center justify-center">-1</button>
                                                            <div className="w-12 text-center">
                                                                <span className={`text-base font-black ${diffColor}`}>{currentG}</span><span className="text-[10px] text-gray-500">A</span>
                                                            </div>
                                                            <button onClick={() => adjustTermGoal(m.id, term, 1)} className="w-6 h-6 bg-cyan-950/80 text-cyan-400 hover:bg-cyan-900 rounded font-black border border-cyan-900/50 flex items-center justify-center">+1</button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* ---------------- 🎯 タブ4: 朝一設定 ---------------- */}
                    {activeTab === "settings" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-4 space-y-4 shadow-xl">
                            <div className="space-y-3">
                                <div className="flex justify-between items-center border-b border-slate-700 pb-1">
                                    <h3 className="text-xs font-black text-white">⚙️ 朝一の目標設定·メンバー管理</h3>
                                    <button onClick={addMember} className="bg-indigo-600 hover:bg-indigo-55 text-white font-bold text-[11px] px-2.5 py-1.5 rounded-lg flex items-center gap-1 shadow">➕ インターン生を追加</button>
                                </div>

                                <div className="space-y-4 max-h-[40vh] overflow-y-auto pr-1">
                                    {members.map((m, index) => (
                                        <div key={m.id} className="bg-slate-900/60 p-3 rounded-xl border border-slate-700 space-y-2 relative">
                                            <button onClick={() => removeMember(m.id)} className="absolute top-2 right-2 text-red-400 hover:text-red-500 font-bold text-xs">✕ 削除</button>
                                            
                                            <div className="flex gap-2 max-w-[85%]">
                                                <input type="text" value={m.name} onChange={(e) => updateMemberField(m.id, "name", e.target.value)} className="bg-slate-800 border border-slate-600 rounded px-2 py-0.5 text-xs font-bold text-white w-28" />
                                                <select value={m.buddyGroup} onChange={(e) => updateMemberField(m.id, "buddyGroup", e.target.value)} className="bg-slate-800 border border-slate-600 rounded p-0.5 text-[10px] font-bold text-purple-300">
                                                    <option value="none">バディなし</option>
                                                    <option value="バディ1">バディ1</option>
                                                    <option value="バディ2">バディ2</option>
                                                    <option value="バディ3">バディ3</option>
                                                    <option value="バディ4">バディ4</option>
                                                    <option value="バディ5">バディ5</option>
                                                </select>
                                            </div>

                                            <div className="grid grid-cols-1 gap-2 bg-slate-950/50 p-2 rounded border border-slate-800">
                                                <div>
                                                    <label className="block text-[10px] text-indigo-400 font-black mb-1">🎯 朝一の「架電数」目標（1日の総数）</label>
                                                    <input type="number" value={m.goalCalls === 0 ? "" : m.goalCalls} placeholder="0" onFocus={(e) => e.target.select()} onChange={(e) => updateMemberField(m.id, "goalCalls", e.target.value === "" ? 0 : Number(e.target.value))} className="w-full max-w-[120px] bg-slate-800 border border-slate-700 rounded text-center text-xs font-black text-indigo-300 py-1" />
                                                </div>
                                                
                                                <div>
                                                    <label className="block text-[10px] text-emerald-400 font-black mb-1">🎯 朝一の「予約数」目標（時間帯ごとに入力）</label>
                                                    <div className="grid grid-cols-4 gap-1 text-center">
                                                        {TERMS.map(t => (
                                                            <div key={t}>
                                                                <div className="text-[9px] text-gray-400 scale-90">{t.split('-')[0]}~</div>
                                                                <input type="number" value={m.initialTermGoals[t] === 0 ? "" : m.initialTermGoals[t]} placeholder="0" onFocus={(e) => e.target.select()} onChange={(e) => updateInitialTermGoal(m.id, t, e.target.value === "" ? 0 : Number(e.target.value))} className="w-full bg-slate-800 border border-slate-700 rounded text-center text-xs font-black text-emerald-400 py-0.5" />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="pt-2 border-t border-slate-700 text-center">
                                <button onClick={handleResetAll} className="w-full max-w-xs bg-red-700 hover:bg-red-600 text-white font-black text-xs py-2.5 rounded-xl shadow-md transition">
                                    🚨 本日の進捗数値をすべて0にリセット
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
