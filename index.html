<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テレアポ進捗マトリックス</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-900 p-2 md:p-6 text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const TERMS = ["11:00-13:00", "13:00-15:00", "15:00-17:00", "17:00-19:00"];
        const APP_KEYS = ["app_28_connect", "app_28_callback", "app_27_connect", "app_27_callback", "app_27_sms"];

        const initialMembers = [
            {
                id: "user-1",
                name: "オープン太郎",
                buddyGroup: "バディ1",
                goalCalls: 0,
                goalApps: 0,
                // 行動量は1日の累積として直下で管理
                calls_28: 0, calls_27: 0,
                connects_28: 0, connects_27: 0,
                callbacks_28: 0, callbacks_27: 0,
                hourly: TERMS.reduce((acc, term) => {
                    acc[term] = { app_28_connect: 0, app_28_callback: 0, app_27_connect: 0, app_27_callback: 0, app_27_sms: 0 };
                    return acc;
                }, {})
            },
            {
                id: "user-2",
                name: "オープン花子",
                buddyGroup: "バディ1",
                goalCalls: 0,
                goalApps: 0,
                calls_28: 0, calls_27: 0,
                connects_28: 0, connects_27: 0,
                callbacks_28: 0, callbacks_27: 0,
                hourly: TERMS.reduce((acc, term) => {
                    acc[term] = { app_28_connect: 0, app_28_callback: 0, app_27_connect: 0, app_27_callback: 0, app_27_sms: 0 };
                    return acc;
                }, {})
            }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState("matrix");
            const [members, setMembers] = useState(initialMembers);
            const [selectedMemberId, setSelectedMemberId] = useState("user-1");
            const [selectedTerm, setSelectedTerm] = useState("11:00-13:00"); // アポ用時間帯
            const [selectedAppType, setSelectedAppType] = useState("app_28_connect"); // アポ経路用

            // --- インターン生の追加 ---
            const addMember = () => {
                const newId = `user-${Date.now()}`;
                setMembers(prev => [
                    ...prev,
                    {
                        id: newId, name: `インターン生${prev.length + 1}`, buddyGroup: "なし", goalCalls: 0, goalApps: 0,
                        calls_28: 0, calls_27: 0, connects_28: 0, connects_27: 0, callbacks_28: 0, callbacks_27: 0,
                        hourly: TERMS.reduce((acc, term) => {
                            acc[term] = { app_28_connect: 0, app_28_callback: 0, app_27_connect: 0, app_27_callback: 0, app_27_sms: 0 };
                            return acc;
                        }, {})
                    }
                ]);
            };

            const removeMember = (id) => {
                if (members.length <= 1) return;
                setMembers(prev => {
                    const filtered = prev.filter(m => m.id !== id);
                    if (selectedMemberId === id) setSelectedMemberId(filtered[0].id);
                    return filtered;
                });
            };

            const updateMemberField = (id, field, value) => {
                setMembers(prev => prev.map(m => m.id === id ? { ...m, [field]: value } : m));
            };

            // アポ数の増減（時間ごと）
            const handleAppChange = (memberId, term, type, amount) => {
                setMembers(prev => prev.map(m => {
                    if (m.id !== memberId) return m;
                    const newVal = Math.max(0, m.hourly[term][type] + amount);
                    return {
                        ...m,
                        hourly: { ...m.hourly, [term]: { ...m.hourly[term], [type]: newVal } }
                    };
                }));
            };

            // 行動量の増減（累積直結）
            const handleActivityChange = (memberId, type, amount) => {
                setMembers(prev => prev.map(m => {
                    if (m.id !== memberId) return m;
                    return { ...m, [type]: Math.max(0, m[type] + amount) };
                }));
            };

            // --- 自動計算 (全体・バディ・時間帯) ---
            const stats = useMemo(() => {
                let totalGoalCalls = 0; let totalGoalApps = 0;
                let totalCalls = 0; let totalApps = 0; let totalConnects = 0; let totalCallbacks = 0;

                const termTotals = TERMS.reduce((acc, term) => {
                    acc[term] = { apps: 0 };
                    return acc;
                }, {});

                members.forEach(m => {
                    totalGoalCalls += m.goalCalls;
                    totalGoalApps += m.goalApps;
                    
                    totalCalls += (m.calls_28 + m.calls_27);
                    totalConnects += (m.connects_28 + m.connects_27);
                    totalCallbacks += (m.callbacks_28 + m.callbacks_27);

                    TERMS.forEach(term => {
                        const h = m.hourly[term];
                        const termApps = APP_KEYS.reduce((sum, k) => sum + h[k], 0);
                        totalApps += termApps;
                        termTotals[term].apps += termApps;
                    });
                });

                const buddyStats = {};
                members.forEach(m => {
                    if (!m.buddyGroup || m.buddyGroup === "なし" || m.buddyGroup === "none") return;
                    if (!buddyStats[m.buddyGroup]) buddyStats[m.buddyGroup] = { goalCalls: 0, goalApps: 0, apps: 0 };
                    buddyStats[m.buddyGroup].goalCalls += m.goalCalls;
                    buddyStats[m.buddyGroup].goalApps += m.goalApps;
                    TERMS.forEach(term => {
                        buddyStats[m.buddyGroup].apps += APP_KEYS.reduce((sum, k) => sum + m.hourly[term][k], 0);
                    });
                });

                return {
                    total: { goalCalls: totalGoalCalls, goalApps: totalGoalApps, calls: totalCalls, apps: totalApps, connects: totalConnects, callbacks: totalCallbacks },
                    terms: termTotals,
                    buddies: buddyStats
                };
            }, [members]);

            const currentSelectedMember = members.find(m => m.id === selectedMemberId) || members[0];

            return (
                <div className="max-w-7xl mx-auto space-y-4 pb-12 select-none">
                    
                    {/* 全体総進捗ダッシュボード */}
                    <div className="bg-gradient-to-r from-slate-800 via-indigo-950 to-slate-800 p-4 rounded-2xl border border-indigo-500/40 shadow-xl">
                        <h2 className="text-center text-xs font-bold text-indigo-400 tracking-widest mb-3">📱 本日の全体総進捗 (全員の合計)</h2>
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center border border-emerald-500/20">
                                <p className="text-[10px] text-emerald-400 font-bold">総アポ数</p>
                                <p className="text-xl font-black text-emerald-400">{stats.total.apps} <span className="text-xs font-normal text-gray-500">/ {stats.total.goalApps}</span></p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center">
                                <p className="text-[10px] text-indigo-300">総架電数</p>
                                <p className="text-xl font-black text-indigo-300">{stats.total.calls} <span className="text-xs font-normal text-gray-500">/ {stats.total.goalCalls}</span></p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center">
                                <p className="text-[10px] text-amber-400">総着電数</p>
                                <p className="text-xl font-black text-amber-400">{stats.total.connects}</p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center">
                                <p className="text-[10px] text-purple-400">総折り返し数</p>
                                <p className="text-xl font-black text-purple-400">{stats.total.callbacks}</p>
                            </div>
                        </div>
                    </div>

                    {/* タブナビゲーション */}
                    <div className="flex bg-slate-800 p-1 rounded-xl w-full max-w-md mx-auto border border-slate-700 text-xs">
                        <button onClick={() => setActiveTab("matrix")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "matrix" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>📊 まとまった進捗表</button>
                        <button onClick={() => setActiveTab("activity")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "activity" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>📞 行動量・アポ入力</button>
                        <button onClick={() => setActiveTab("settings")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "settings" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>⚙️ 設定 ({members.length}人)</button>
                    </div>

                    {/* ---------------- 📊 タブ1: 進捗表 ---------------- */}
                    {activeTab === "matrix" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-2 overflow-hidden shadow-inner">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[750px]">
                                    <thead>
                                        <tr className="border-b border-slate-700 text-[11px] text-gray-400">
                                            <th className="p-2 sticky left-0 bg-slate-800 z-10 w-28">メンバー</th>
                                            <th className="p-2 text-center w-48">個人累積・分析レート</th>
                                            {TERMS.map(t => <th key={t} className="p-2 text-center text-gray-300 font-medium">{t}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50 text-xs">
                                        {members.map(m => {
                                            const myTotalApps = TERMS.reduce((sum, t) => sum + APP_KEYS.reduce((s, k) => s + m.hourly[t][k], 0), 0);
                                            const myConnectApps = TERMS.reduce((sum, t) => sum + m.hourly[t].app_28_connect + m.hourly[t].app_27_connect, 0);
                                            const myCallbackApps = TERMS.reduce((sum, t) => sum + m.hourly[t].app_28_callback + m.hourly[t].app_27_callback, 0);
                                            const mySmsApps = TERMS.reduce((sum, t) => sum + m.hourly[t].app_27_sms, 0);

                                            const myTotalConnects = m.connects_28 + m.connects_27;
                                            const myTotalCallbacks = m.callbacks_28 + m.callbacks_27;

                                            const bStat = stats.buddies[m.buddyGroup] || { apps:0, goalApps:0 };

                                            // 🛡️ 100%超えのエラーガードロジック
                                            const connectRateStr = myConnectApps > myTotalConnects 
                                                ? "⚠️エラー" 
                                                : (myTotalConnects > 0 ? Math.round((myConnectApps / myTotalConnects) * 100) + "%" : "0%");
                                            
                                            const callbackRateStr = myCallbackApps > myTotalCallbacks 
                                                ? "⚠️エラー" 
                                                : (myTotalCallbacks > 0 ? Math.round((myCallbackApps / myTotalCallbacks) * 100) + "%" : "0%");

                                            return (
                                                <tr key={m.id} className="hover:bg-slate-750">
                                                    <td className="p-2 font-bold sticky left-0 bg-slate-800 shadow-md z-10">
                                                        <div className="text-white text-sm">{m.name}</div>
                                                        {m.buddyGroup !== "none" && m.buddyGroup !== "なし" && <div className="text-[10px] text-purple-400">👥 {bStat.apps}/{bStat.goalApps}A</div>}
                                                    </td>
                                                    <td className="p-2 bg-slate-900/20 text-left text-[11px] font-medium space-y-0.5 whitespace-nowrap border-r border-slate-700/30">
                                                        <div className="flex justify-between text-gray-300"><span>総アポ:</span><span className="font-bold text-emerald-400">{myTotalApps} / {m.goalApps} <span className="text-[9px] text-gray-500">(SMS:{mySmsApps})</span></span></div>
                                                        
                                                        {/* エラー検知時は赤背景＆赤文字に変化 */}
                                                        <div className={`text-[10px] flex justify-between px-1 rounded ${connectRateStr.includes("⚠️") ? "bg-red-950/50 text-red-400 font-bold" : "text-amber-400/90"}`}>
                                                            <span>📞 着電→予約率:</span><span>{connectRateStr} <span className="text-[9px] opacity-60">({myConnectApps}A/{myTotalConnects}着)</span></span>
                                                        </div>
                                                        <div className={`text-[10px] flex justify-between px-1 rounded ${callbackRateStr.includes("⚠️") ? "bg-red-950/50 text-red-400 font-bold" : "text-purple-400/90"}`}>
                                                            <span>🔄 折返→予約率:</span><span>{callbackRateStr} <span className="text-[9px] opacity-60">({myCallbackApps}A/{myTotalCallbacks}折)</span></span>
                                                        </div>
                                                    </td>
                                                    {TERMS.map(term => {
                                                        const h = m.hourly[term];
                                                        const termApps = APP_KEYS.reduce((sum, k) => sum + h[k], 0);
                                                        return termApps === 0 ? (
                                                            <td key={term} className="p-2 text-center text-gray-600 font-medium">-</td>
                                                        ) : (
                                                            <td key={term} className="p-2 text-center min-w-[110px] bg-emerald-950/20">
                                                                <div className="text-base font-black text-emerald-400">{termApps} <span className="text-xs font-normal text-gray-400">A</span></div>
                                                                <div className="text-[9px] text-gray-400 leading-tight mt-0.5">
                                                                    {h.app_28_connect > 0 && <div>28着:{h.app_28_connect}</div>}
                                                                    {h.app_28_callback > 0 && <div>28折:{h.app_28_callback}</div>}
                                                                    {h.app_27_connect > 0 && <div>27着:{h.app_27_connect}</div>}
                                                                    {h.app_27_callback > 0 && <div>27折:{h.app_27_callback}</div>}
                                                                    {h.app_27_sms > 0 && <div>27SMS:{h.app_27_sms}</div>}
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                    <tfoot>
                                        <tr className="bg-slate-950 font-bold border-t-2 border-slate-600 text-xs">
                                            <td className="p-3 sticky left-0 bg-slate-950 z-10 text-indigo-400">⏰ 全員合計</td>
                                            <td className="p-3 text-center text-emerald-400 text-sm">{stats.total.apps} アポ</td>
                                            {TERMS.map(term => {
                                                const tData = stats.terms[term];
                                                const termGoalApps = stats.total.goalApps / 4;
                                                const rate = termGoalApps > 0 ? Math.round((tData.apps / termGoalApps) * 100) : 0;
                                                return (
                                                    <td key={term} className="p-3 text-center">
                                                        <div className="text-emerald-400 text-sm font-black">{tData.apps} A</div>
                                                        <div className="text-[10px] bg-slate-800 text-amber-400 rounded px-1 py-0.5 mt-1 inline-block">達成率:{rate}%</div>
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* ---------------- 📞 タブ2: 行動量・アポ入力 ---------------- */}
                    {activeTab === "activity" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-4 space-y-4 shadow-xl">
                            {/* メンバー選択 */}
                            <div className="flex items-center gap-2 bg-slate-900 p-2 rounded-xl border border-slate-700">
                                <label className="text-xs font-bold text-gray-400 whitespace-nowrap">インターン生:</label>
                                <select value={selectedMemberId} onChange={(e) => setSelectedMemberId(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-xs font-bold text-white outline-none">
                                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                            </div>

                            {/* 🎯 ① アポ獲得入力（時間帯ごとの枠） */}
                            <div className="p-3 rounded-xl bg-emerald-950/20 border border-emerald-900/40 space-y-3">
                                <div className="text-xs font-black text-emerald-400 border-b border-emerald-900/30 pb-1">🎯 アポ（予約）の記録（プルダウン必須）</div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[10px] text-gray-400 font-bold mb-1">① 時間帯（ターム）</label>
                                        <select value={selectedTerm} onChange={(e) => setSelectedTerm(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded p-1 text-xs text-white outline-none">
                                            {TERMS.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-gray-400 font-bold mb-1">② アポ経路</label>
                                        <select value={selectedAppType} onChange={(e) => setSelectedAppType(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded p-1 text-xs text-emerald-300 font-bold outline-none">
                                            <option value="app_28_connect">28卒(着電)</option>
                                            <option value="app_28_callback">28卒(折り返し)</option>
                                            <option value="app_27_connect">27卒(着電)</option>
                                            <option value="app_27_callback">27卒(折り返し)</option>
                                            <option value="app_27_sms">27卒(SMS)</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="flex items-center justify-between bg-slate-950 px-3 py-1.5 rounded border border-slate-800">
                                    <span className="text-[11px] text-gray-400">選択した時間・経路の件数:</span>
                                    <div className="flex items-center gap-3">
                                        <button onClick={() => handleAppChange(selectedMemberId, selectedTerm, selectedAppType, -1)} className="w-7 h-7 bg-slate-800 rounded text-gray-400 font-black text-sm">-1</button>
                                        <span className="font-black text-emerald-400 text-lg w-6 text-center">{currentSelectedMember.hourly[selectedTerm][selectedAppType]}</span>
                                        <button onClick={() => handleAppChange(selectedMemberId, selectedTerm, selectedAppType, 1)} className="w-7 h-7 bg-emerald-600 rounded text-white font-black text-sm">+1</button>
                                    </div>
                                </div>
                            </div>

                            {/* 📞 ② 行動量入力マトリックス（行：項目 × 列：卒） */}
                            <div className="p-3 rounded-xl bg-slate-900/60 border border-slate-700 space-y-3">
                                <div className="text-xs font-black text-indigo-400 border-b border-slate-800 pb-1">📊 1日の行動量（累積ポチポチ表）</div>
                                
                                <div className="overflow-hidden rounded-lg border border-slate-800 bg-slate-950/40">
                                    <table className="w-full text-center border-collapse text-xs">
                                        <thead>
                                            <tr className="bg-slate-950 text-[10px] text-gray-400 border-b border-slate-800">
                                                <th className="p-2 text-left w-16">行動項目</th>
                                                <th className="p-2 text-indigo-300 font-black text-sm w-1/2">🔥 28卒 (メイン)</th>
                                                <th className="p-2 text-gray-400 w-1/3">📄 27卒</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/60">
                                            {[
                                                { label: "架電数", key28: "calls_28", key27: "calls_27", colorClass: "text-indigo-300" },
                                                { label: "着電数", key28: "connects_28", key27: "connects_27", colorClass: "text-amber-400" },
                                                { label: "折り返し", key28: "callbacks_28", key27: "callbacks_27", colorClass: "text-purple-400" }
                                            ].map(row => (
                                                <tr key={row.label} className="hover:bg-slate-900/20">
                                                    {/* 行ラベル */}
                                                    <td className={`p-2 text-left font-black border-r border-slate-800 ${row.colorClass}`}>{row.label}</td>
                                                    
                                                    {/* 28卒列（特大ボタン） */}
                                                    <td className="p-2 space-y-1.5 border-r border-slate-800">
                                                        <div className="text-xl font-black text-white">{currentSelectedMember[row.key28]} <span className="text-[10px] text-gray-500 font-normal">件</span></div>
                                                        <div className="flex gap-1 justify-center flex-wrap">
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, -50)} className="px-1 py-1 text-[9px] text-red-400 font-bold">-50</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, -10)} className="px-1 py-1 text-[9px] text-red-400 font-bold">-10</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, -5)} className="px-1 py-1 text-[9px] text-red-400 font-bold">-5</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, -1)} className="px-2 py-0.5 text-xs text-gray-400 bg-slate-900 border border-slate-800 rounded">-1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, 1)} className="px-3 py-0.5 bg-slate-700 text-white rounded font-black text-xs">+1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, 5)} className="px-3 py-0.5 bg-blue-600 text-white rounded font-black text-xs">+5</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, 10)} className="px-3 py-0.5 bg-indigo-600 text-white rounded font-black text-xs">+10</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key28, 50)} className="px-3 py-0.5 bg-purple-600 text-white rounded font-black text-xs">+50</button>
                                                        </div>
                                                    </td>

                                                    {/* 27卒列（コンパクト） */}
                                                    <td className="p-2 space-y-1">
                                                        <div className="text-base font-bold text-gray-300">{currentSelectedMember[row.key27]}</div>
                                                        <div className="flex gap-1 justify-center flex-wrap scale-90">
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key27, -5)} className="px-1 py-0.5 text-[10px] text-red-400/80 font-bold">-5</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key27, -1)} className="px-1.5 py-0.5 text-[10px] text-gray-400 bg-slate-900 border border-slate-800 rounded">-1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key27, 1)} className="px-2 py-0.5 bg-slate-800 text-white rounded font-bold text-[10px]">+1</button>
                                                            <button onClick={() => handleActivityChange(selectedMemberId, row.key27, 5)} className="px-2 py-0.5 bg-slate-700 text-white rounded font-bold text-[10px]">+5</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ---------------- 🎯 タブ3: 設定 ---------------- */}
                    {activeTab === "settings" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-4 space-y-4 shadow-xl">
                            <div className="flex justify-between items-center border-b border-slate-700 pb-2">
                                <div>
                                    <h2 className="text-sm font-black text-white">⚙️ 朝一の目標・人数設定</h2>
                                    <p className="text-[10px] text-gray-400">ここに入力すると他のタブへ自動で移ります。</p>
                                </div>
                                <button onClick={addMember} className="bg-indigo-600 hover:bg-indigo-55 text-white font-bold text-xs px-3 py-2 rounded-xl flex items-center gap-1 shadow">
                                    ➕ インターン生を追加
                                </button>
                            </div>

                            <div className="space-y-2 max-h-[55vh] overflow-y-auto pr-1">
                                {members.map((m, index) => (
                                    <div key={m.id} className="grid grid-cols-12 gap-1.5 bg-slate-900/60 p-2 rounded-xl border border-slate-700 items-center">
                                        <div className="col-span-4">
                                            <input type="text" value={m.name} onChange={(e) => updateMemberField(m.id, "name", e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-xs font-bold text-white outline-none" />
                                        </div>
                                        <div className="col-span-3">
                                            <select value={m.buddyGroup} onChange={(e) => updateMemberField(m.id, "buddyGroup", e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-1 text-[10px] font-bold text-purple-300 outline-none">
                                                <option value="none">バディなし</option>
                                                <option value="バディ1">バディ1</option>
                                                <option value="バディ2">バディ2</option>
                                                <option value="バディ3">バディ3</option>
                                                <option value="バディ4">バディ4</option>
                                                <option value="バディ5">バディ5</option>
                                            </select>
                                        </div>
                                        <div className="col-span-2">
                                            <input type="number" value={m.goalCalls === 0 ? "" : m.goalCalls} placeholder="0" onFocus={(e) => e.target.select()} onChange={(e) => updateMemberField(m.id, "goalCalls", e.target.value === "" ? 0 : Number(e.target.value))} className="w-full bg-slate-800 border border-slate-600 rounded-lg py-1 text-xs text-center text-indigo-300 font-bold" />
                                        </div>
                                        <div className="col-span-2">
                                            <input type="number" value={m.goalApps === 0 ? "" : m.goalApps} placeholder="0" onFocus={(e) => e.target.select()} onChange={(e) => updateMemberField(m.id, "goalApps", e.target.value === "" ? 0 : Number(e.target.value))} className="w-full bg-slate-800 border border-slate-600 rounded-lg py-1 text-xs text-center text-emerald-400 font-bold" />
                                        </div>
                                        <button onClick={() => removeMember(m.id)} className="col-span-1 text-center text-red-400 hover:text-red-500 font-bold text-sm">✕</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
