<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テレアポ進捗マトリックス</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-900 p-2 md:p-6 text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const TERMS = ["11:00-13:00", "13:00-15:00", "15:00-17:00", "17:00-19:00"];

        // 初期デフォは2人、目標はゼロ
        const initialMembers = [
            {
                id: "user-1",
                name: "オープン太郎",
                buddyGroup: "バディ1",
                goalCalls: 0,
                goalApps: 0,
                hourly: TERMS.reduce((acc, term) => {
                    acc[term] = { apps: 0, calls: 0, connects: 0, callbacks: 0 };
                    return acc;
                }, {})
            },
            {
                id: "user-2",
                name: "オープン花子",
                buddyGroup: "バディ1",
                goalCalls: 0,
                goalApps: 0,
                hourly: TERMS.reduce((acc, term) => {
                    acc[term] = { apps: 0, calls: 0, connects: 0, callbacks: 0 };
                    return acc;
                }, {})
            }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState("matrix"); // matrix, activity, settings
            const [members, setMembers] = useState(initialMembers);
            const [selectedMemberId, setSelectedMemberId] = useState("user-1"); // 行動量ページ用

            // --- 人数の増減ロジック ---
            const addMember = () => {
                const newId = `user-${Date.now()}`;
                setMembers(prev => [
                    ...prev,
                    {
                        id: newId,
                        name: `インターン生${prev.length + 1}`,
                        buddyGroup: "なし",
                        goalCalls: 0,
                        goalApps: 0,
                        hourly: TERMS.reduce((acc, term) => {
                            acc[term] = { apps: 0, calls: 0, connects: 0, callbacks: 0 };
                            return acc;
                        }, {})
                    }
                ]);
            };

            const removeMember = (id) => {
                if (members.length <= 1) return; // 最低1人は残す
                setMembers(prev => {
                    const filtered = prev.filter(m => m.id !== id);
                    if (selectedMemberId === id) setSelectedMemberId(filtered[0].id);
                    return filtered;
                });
            };

            // --- データ更新 ---
            const updateMemberField = (id, field, value) => {
                setMembers(prev => prev.map(m => m.id === id ? { ...m, [field]: value } : m));
            };

            const handleProgressChange = (memberId, term, type, amount) => {
                setMembers(prev => prev.map(m => {
                    if (m.id !== memberId) return m;
                    const newVal = Math.max(0, m.hourly[term][type] + amount);
                    return {
                        ...m,
                        hourly: { ...m.hourly, [term]: { ...m.hourly[term], [type]: newVal } }
                    };
                }));
            };

            // --- 自動計算 (全体・バディ・時間帯) ---
            const stats = useMemo(() => {
                let totalGoalCalls = 0; let totalGoalApps = 0;
                let totalCalls = 0; let totalApps = 0; let totalConnects = 0; let totalCallbacks = 0;

                const termTotals = TERMS.reduce((acc, term) => {
                    acc[term] = { apps: 0, calls: 0, connects: 0, callbacks: 0 };
                    return acc;
                }, {});

                members.forEach(m => {
                    totalGoalCalls += m.goalCalls;
                    totalGoalApps += m.goalApps;
                    TERMS.forEach(term => {
                        const h = m.hourly[term];
                        totalCalls += h.calls; totalApps += h.apps; totalConnects += h.connects; totalCallbacks += h.callbacks;
                        termTotals[term].calls += h.calls; termTotals[term].apps += h.apps;
                        termTotals[term].connects += h.connects; termTotals[term].callbacks += h.callbacks;
                    });
                });

                const buddyStats = {};
                members.forEach(m => {
                    if (!m.buddyGroup || m.buddyGroup === "なし") return;
                    if (!buddyStats[m.buddyGroup]) buddyStats[m.buddyGroup] = { goalCalls: 0, goalApps: 0, calls: 0, apps: 0 };
                    buddyStats[m.buddyGroup].goalCalls += m.goalCalls;
                    buddyStats[m.buddyGroup].goalApps += m.goalApps;
                    TERMS.forEach(term => {
                        buddyStats[m.buddyGroup].calls += m.hourly[term].calls;
                        buddyStats[m.buddyGroup].apps += m.hourly[term].apps;
                    });
                });

                return {
                    total: { goalCalls: totalGoalCalls, goalApps: totalGoalApps, calls: totalCalls, apps: totalApps, connects: totalConnects, callbacks: totalCallbacks },
                    terms: termTotals,
                    buddies: buddyStats
                };
            }, [members]);

            const currentSelectedMember = members.find(m => m.id === selectedMemberId) || members[0];

            return (
                <div className="max-w-7xl mx-auto space-y-4 pb-12 select-none">
                    
                    {/* 🏆 一番大きく全体の数字を表示（ダッシュボード） */}
                    <div className="bg-gradient-to-r from-slate-800 via-indigo-950 to-slate-800 p-4 rounded-2xl border border-indigo-500/40 shadow-xl">
                        <h2 className="text-center text-xs font-bold text-indigo-400 tracking-widest mb-3">📱 本日の全体総進捗 (全員の合計)</h2>
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center border border-emerald-500/20">
                                <p className="text-[10px] text-emerald-400 font-bold">総アポ数</p>
                                <p className="text-xl font-black text-emerald-400">{stats.total.apps} <span className="text-xs font-normal text-gray-500">/ {stats.total.goalApps}</span></p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center">
                                <p className="text-[10px] text-indigo-300">総架電数</p>
                                <p className="text-xl font-black text-indigo-300">{stats.total.calls} <span className="text-xs font-normal text-gray-500">/ {stats.total.goalCalls}</span></p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center">
                                <p className="text-[10px] text-amber-400">総着電数</p>
                                <p className="text-xl font-black text-amber-400">{stats.total.connects}</p>
                            </div>
                            <div className="bg-slate-900/80 p-2 rounded-xl text-center">
                                <p className="text-[10px] text-purple-400">総折り返し数</p>
                                <p className="text-xl font-black text-purple-400">{stats.total.callbacks}</p>
                            </div>
                        </div>
                    </div>

                    {/* ナビゲーションタブ */}
                    <div className="flex bg-slate-800 p-1 rounded-xl w-full max-w-md mx-auto border border-slate-700 text-xs">
                        <button onClick={() => setActiveTab("matrix")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "matrix" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>📊 アポ進捗表</button>
                        <button onClick={() => setActiveTab("activity")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "activity" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>📞 行動量入力</button>
                        <button onClick={() => setActiveTab("settings")} className={`flex-1 py-2 rounded-lg font-bold transition ${activeTab === "settings" ? "bg-indigo-600 text-white" : "text-gray-400"}`}>⚙️ 設定 ({members.length}人)</button>
                    </div>

                    {/* ---------------- 📊 タブ1: アポ進捗表 (行列形式) ---------------- */}
                    {activeTab === "matrix" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-2 overflow-hidden shadow-inner">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[650px]">
                                    <thead>
                                        <tr className="border-b border-slate-700 text-[11px] text-gray-400">
                                            <th className="p-2 sticky left-0 bg-slate-800 z-10 w-28">メンバー</th>
                                            <th className="p-2 text-center w-24">累積 / 目標</th>
                                            {TERMS.map(t => <th key={t} className="p-2 text-center text-gray-300 font-medium">{t}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50 text-xs">
                                        {members.map(m => {
                                            const myTotalApps = TERMS.reduce((sum, t) => sum + m.hourly[t].apps, 0);
                                            const bStat = stats.buddies[m.buddyGroup] || { apps:0, goalApps:0 };
                                            return (
                                                <tr key={m.id} className="hover:bg-slate-750">
                                                    <td className="p-2 font-bold sticky left-0 bg-slate-800 shadow-md z-10">
                                                        <div className="text-white text-sm">{m.name}</div>
                                                        {m.buddyGroup !== "なし" && <div className="text-[10px] text-purple-400">👥 {m.buddyGroup} ({bStat.apps}/{bStat.goalApps}A)</div>}
                                                    </td>
                                                    <td className="p-2 text-center bg-slate-900/20 font-bold">
                                                        <span className="text-emerald-400 text-sm">{myTotalApps}</span> <span className="text-gray-500">/ {m.goalApps}</span>
                                                    </td>
                                                    {TERMS.map(term => (
                                                        <td key={term} className="p-2 text-center min-w-[100px]">
                                                            <div className="flex items-center justify-between bg-slate-900 px-2 py-1.5 rounded-lg border border-slate-700 max-w-[120px] mx-auto">
                                                                <button onClick={() => handleProgressChange(m.id, term, "apps", -1)} className="w-6 h-6 bg-slate-800 rounded text-gray-400 font-black text-sm">-</button>
                                                                <span className="font-black text-emerald-400 text-base">{m.hourly[term].apps}</span>
                                                                <button onClick={() => handleProgressChange(m.id, term, "apps", 1)} className="w-6 h-6 bg-emerald-600 rounded text-white font-black text-sm">+</button>
                                                            </div>
                                                        </td>
                                                    ))}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                    <tfoot>
                                        <tr className="bg-slate-950 font-bold border-t-2 border-slate-600 text-xs">
                                            <td className="p-3 sticky left-0 bg-slate-950 z-10 text-indigo-400">⏰ 全員合計</td>
                                            <td className="p-3 text-center text-emerald-400 text-sm">{stats.total.apps} アポ</td>
                                            {TERMS.map(term => {
                                                const tData = stats.terms[term];
                                                const termGoalApps = stats.total.goalApps / 4;
                                                const rate = termGoalApps > 0 ? Math.round((tData.apps / termGoalApps) * 100) : 0;
                                                return (
                                                    <td key={term} className="p-3 text-center">
                                                        <div className="text-emerald-400 text-sm font-black">{tData.apps} A</div>
                                                        <div className="text-[10px] bg-slate-800 text-amber-400 rounded px-1 py-0.5 mt-1 inline-block">達成率:{rate}%</div>
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* ---------------- 📞 タブ2: 行動量入力ページ (架電・着電・折り返し) ---------------- */}
                    {activeTab === "activity" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-4 space-y-4 shadow-xl">
                            {/* メンバー選択 */}
                            <div className="flex items-center gap-2">
                                <label className="text-xs font-bold text-gray-400 whitespace-nowrap">記録する人:</label>
                                <select value={selectedMemberId} onChange={(e) => setSelectedMemberId(e.target.value)} className="w-full bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-sm font-bold text-white outline-none">
                                    {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                            </div>

                            {/* 4タームの入力カード */}
                            <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-1">
                                {TERMS.map(term => {
                                    const hData = currentSelectedMember.hourly[term];
                                    return (
                                        <div key={term} className="bg-slate-900/60 p-3 rounded-xl border border-slate-700 space-y-2">
                                            <div className="text-xs font-black text-indigo-400 border-b border-slate-800 pb-1">🕒 {term}</div>
                                            
                                            {/* 各指標のポチポチ増減ブロック */}
                                            {[
                                                { label: "📞 架電数", key: "calls", color: "text-indigo-300", bg:"bg-indigo-950/40" },
                                                { label: "🤙 着電数", key: "connects", color: "text-amber-400", bg:"bg-amber-950/20" },
                                                { label: "🔄 折り返し", key: "callbacks", color: "text-purple-400", bg:"bg-purple-950/20" }
                                            ].map(item => (
                                                <div key={item.key} className={`flex flex-col sm:flex-row sm:items-center justify-between p-2 rounded-lg ${item.bg} gap-2`}>
                                                    <div className="flex justify-between items-center sm:w-1/4">
                                                        <span className={`text-xs font-bold ${item.color}`}>{item.label}</span>
                                                        <span className="text-base font-black px-2">{hData[item.key]}</span>
                                                    </div>
                                                    {/* まとまった数字ボタン */}
                                                    <div className="flex gap-1 justify-end flex-wrap">
                                                        <button onClick={() => handleProgressChange(selectedMemberId, term, item.key, -1)} className="px-2 py-1 bg-slate-800 text-gray-400 rounded font-bold text-xs hover:bg-slate-700">-1</button>
                                                        <button onClick={() => handleProgressChange(selectedMemberId, term, item.key, 1)} className="px-3 py-1 bg-slate-700 text-white rounded font-bold text-xs hover:bg-slate-600">+1</button>
                                                        <button onClick={() => handleProgressChange(selectedMemberId, term, item.key, 10)} className="px-2.5 py-1 bg-indigo-600 text-white rounded font-bold text-xs hover:bg-indigo-500">+10</button>
                                                        <button onClick={() => handleProgressChange(selectedMemberId, term, item.key, 50)} className="px-2.5 py-1 bg-purple-600 text-white rounded font-bold text-xs hover:bg-purple-500">+50</button>
                                                        <button onClick={() => handleProgressChange(selectedMemberId, term, item.key, 100)} className="px-2.5 py-1 bg-emerald-600 text-white rounded font-bold text-xs hover:bg-emerald-500">+100</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* ---------------- 🎯 タブ3: 目標・バディ・人数設定ページ ---------------- */}
                    {activeTab === "settings" && (
                        <div className="bg-slate-800 rounded-2xl border border-slate-700 p-4 space-y-4 shadow-xl">
                            <div className="flex justify-between items-center border-b border-slate-700 pb-2">
                                <div>
                                    <h2 className="text-sm font-black text-white">⚙️ 朝一の目標・人数設定</h2>
                                    <p className="text-[10px] text-gray-400">打ち込み時のストレス（0消し）を完全に無くしました。</p>
                                </div>
                                {/* 人数増やすボタン */}
                                <button onClick={addMember} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-3 py-2 rounded-xl flex items-center gap-1 shadow">
                                    ➕ インターン生を追加
                                </button>
                            </div>

                            <div className="space-y-2 max-h-[55vh] overflow-y-auto pr-1">
                                {members.map((m, index) => (
                                    <div key={m.id} className="grid grid-cols-12 gap-1.5 bg-slate-900/60 p-2 rounded-xl border border-slate-700 items-center">
                                        {/* 名前変更 */}
                                        <div className="col-span-4">
                                            <input type="text" value={m.name} onChange={(e) => updateMemberField(m.id, "name", e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg px-2 py-1 text-xs font-bold text-white outline-none" />
                                        </div>
                                        {/* バディ組 */}
                                        <div className="col-span-3">
                                            <select value={m.buddyGroup} onChange={(e) => updateMemberField(m.id, "buddyGroup", e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-lg p-1 text-[10px] font-bold text-purple-300 outline-none">
                                                <option value="なし">バディなし</option>
                                                <option value="バディ1">バディ1</option>
                                                <option value="バディ2">バディ2</option>
                                                <option value="バディ3">バディ3</option>
                                                <option value="バディ4">バディ4</option>
                                                <option value="バディ5">バディ5</option>
                                            </select>
                                        </div>
                                        {/* 目標架電 */}
                                        <div className="col-span-2">
                                            <input type="number" value={m.goalCalls === 0 ? "" : m.goalCalls} placeholder="0" onFocus={(e) => e.target.select()} onChange={(e) => updateMemberField(m.id, "goalCalls", e.target.value === "" ? 0 : Number(e.target.value))} className="w-full bg-slate-800 border border-slate-600 rounded-lg py-1 text-xs text-center text-indigo-300 font-bold" />
                                        </div>
                                        {/* 目標アポ */}
                                        <div className="col-span-2">
                                            <input type="number" value={m.goalApps === 0 ? "" : m.goalApps} placeholder="0" onFocus={(e) => e.target.select()} onChange={(e) => updateMemberField(m.id, "goalApps", e.target.value === "" ? 0 : Number(e.target.value))} className="w-full bg-slate-800 border border-slate-600 rounded-lg py-1 text-xs text-center text-emerald-400 font-bold" />
                                        </div>
                                        {/* 削除ボタン */}
                                        <button onClick={() => removeMember(m.id)} className="col-span-1 text-center text-red-400 hover:text-red-500 font-bold text-sm">✕</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
